# BigBrain Configuration
# =====================
# Copy this file and customize for your environment.
# Values here are overridden by BIGBRAIN_* environment variables.

# Application settings
app:
  name: bigbrain
  debug: false

# Logging configuration
logging:
  level: INFO          # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: console      # console | json (json reserved for future)

# File paths
paths:
  config_path: config/example.yaml
  data_dir: data
  kb_dir: data/kb

# AI Provider configuration
# Providers are tried in order of preference with automatic fallback.
providers:
  preferred_provider: ""  # Set to "ollama", "lm_studio", or "github_copilot" to override fallback order
  ollama:
    enabled: false
    base_url: "http://localhost:11434"
    default_model: "llama3.2"
    timeout: 120
  lm_studio:
    enabled: false
    base_url: "http://localhost:1234"
    default_model: ""
    timeout: 120
  github_copilot:
    enabled: true
    # Authentication: run 'bigbrain auth login' (OAuth device flow).
    # Token is cached at ~/.bigbrain/github_token.json — no env var needed.
    base_url: "https://api.githubcopilot.com"
    default_model: "gpt-4o"
    timeout: 120
    max_retries: 5
    retry_delay: 2.0          # base delay for exponential backoff on errors
    request_delay: 0.5        # seconds between every request (rate limit throttle)

# Ingestion settings (Phase 1)
ingestion:
  supported_extensions: [".txt", ".md", ".pdf", ".py"]
  recursive: true
  skip_hidden: true
  max_file_size_mb: 50
  encoding: utf-8
  encoding_fallback: latin-1
  # PDF-specific
  pdf_mode: standard            # standard | max_accuracy (chandra-ocr)
  pdf_extract_metadata: true
  pdf_preserve_pages: true
  py_extract_docstrings: true
  py_extract_symbols: true

# Distillation settings (Phase 4)
distillation:
  chunk_strategy: by_section     # by_section | sliding_window | by_paragraph
  chunk_size: 20000              # max chars per chunk (sliding_window)
  chunk_overlap: 500             # overlap between chunks (sliding_window)
  summary_max_length: 500        # max words for summaries
  entity_extraction: true
  relationship_extraction: true
  max_chunks_per_doc: 10

# Compilation settings (Phase 5)
compile:
  output_dir: build
  default_format: markdown       # markdown | flashcard | cheatsheet | qa | study_guide
  flashcard_count: 20
  qa_count: 15
  include_relationships: true
  include_entities: true

# Notion integration (Phase 6)
notion:
  enabled: true
  # token: ""  # Set via BIGBRAIN_NOTION_TOKEN env var (recommended) or here
  default_page_id: ""  # Parent page ID for new exports
  sync_direction: bidirectional  # bidirectional | import_only | export_only
  auto_create_pages: true

# Knowledge Base settings (Phase 2)
kb:
  backend: sqlite
  # db_path: ""  # Leave empty to use default: <kb_dir>/bigbrain.db

# Plugin settings (Phase 9)
plugins:
  plugins_dir: plugins
  auto_discover: true
  enabled_plugins: []
  disabled_plugins: []

# Entity store backend (Phase 11)
entity_store:
  backend: postgres  # sqlite | postgres | neo4j | qdrant | weaviate | pinecone
  postgres_url: "postgresql://postgres:bigbrain123@localhost:5432/bigbrain"
  # neo4j_url: "bolt://localhost:7687"
  # qdrant_url: "http://localhost:6333"
  # weaviate_url: "http://localhost:8080"
  # pinecone_api_key: ""
